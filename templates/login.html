<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Login | PrognosXAI Terminal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #1a73e8; 
            --lab-green: #34a853; 
            --admin-purple: #6366f1; 
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        body { font-family: 'Inter', sans-serif; background: #f0f2f5; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        
        /* --- Updated Professional Logo --- */
        .logo-box { display: flex; align-items: center; gap: 10px; text-decoration: none; justify-content: center; margin-bottom: 20px; }
        .logo-icon { width: 34px; height: 34px; background: var(--primary); border-radius: 8px; display: flex; align-items: center; justify-content: center; color: white; font-weight: 800; font-size: 18px; box-shadow: 0 4px 10px rgba(26, 115, 232, 0.3); transition: var(--transition); }
        .logo-text { font-size: 1.6rem; font-weight: 800; color: #0f172a; letter-spacing: -1px; }
        .logo-text span { color: var(--primary); transition: var(--transition); }

        .login-card { background: white; padding: 40px; border-radius: 28px; box-shadow: 0 25px 50px rgba(0,0,0,0.06); width: 100%; max-width: 420px; text-align: center; border: 1px solid #e5e7eb; position: relative; }
        
        /* --- Login Tabs --- */
        .tabs { display: flex; background: #f3f4f6; padding: 4px; border-radius: 14px; margin: 25px 0; position: relative; }
        .tab-item { flex: 1; padding: 12px; font-size: 12px; font-weight: 800; color: #6b7280; cursor: pointer; z-index: 1; transition: var(--transition); border-radius: 10px; letter-spacing: 0.5px; }
        .tab-item.active { color: white; }
        
        .selector { position: absolute; top: 4px; left: 4px; height: calc(100% - 8px); width: calc(50% - 4px); background: var(--primary); border-radius: 10px; transition: var(--transition); z-index: 0; box-shadow: 0 4px 12px rgba(26, 115, 232, 0.3); }
        
        /* Admin Mode Color Shifts */
        .admin-active .selector { transform: translateX(100%); background: var(--admin-purple); box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3); }
        .admin-active .logo-icon { background: var(--admin-purple); }
        .admin-active .logo-text span { color: var(--admin-purple); }

        .form-group { text-align: left; margin-bottom: 20px; }
        label { display: block; font-size: 10px; font-weight: 800; color: #94a3b8; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }
        input { width: 100%; padding: 15px; border: 1.5px solid #edf2f7; border-radius: 14px; box-sizing: border-box; outline: none; transition: var(--transition); font-size: 14px; background: #f8fafc; }
        input:focus { border-color: var(--primary); background: white; box-shadow: 0 0 0 4px rgba(26, 115, 232, 0.05); }
        .admin-active input:focus { border-color: var(--admin-purple); box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.05); }

        .btn-login { width: 100%; padding: 16px; background: var(--primary); color: white; border: none; border-radius: 14px; font-weight: 800; cursor: pointer; transition: var(--transition); font-size: 15px; margin-top: 10px; letter-spacing: 0.5px; }
        .btn-login:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(26, 115, 232, 0.2); }
        .admin-active .btn-login { background: var(--admin-purple); }
        .admin-active .btn-login:hover { box-shadow: 0 10px 20px rgba(99, 102, 241, 0.2); }

        /* Notification System */
        #notification { 
            position: fixed; top: -100px; left: 50%; transform: translateX(-50%); 
            background: #1e293b; color: white; padding: 16px 30px; border-radius: 50px; 
            font-weight: 700; font-size: 14px; box-shadow: 0 15px 30px rgba(0,0,0,0.2); 
            transition: 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55); z-index: 2000; 
        }
        #notification.show { top: 30px; }
        #notification.error { background: #ef4444; }

        .loading-overlay { display: none; margin-top: 15px; color: var(--primary); font-weight: 700; font-size: 13px; animation: pulse 1.5s infinite; text-transform: uppercase; letter-spacing: 1px; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    </style>
</head>
<body id="body">

    <div id="notification">Notification Message</div>

    <div class="login-card" id="card">
        <div class="logo-box">
            <div class="logo-icon">P</div>
            <div class="logo-text">Prog<span>XAI</span></div>
        </div>

        <h2 id="title" style="margin: 10px 0 5px; font-weight: 800; letter-spacing: -0.5px;">Secure Terminal</h2>
        <p id="subtitle" style="color: #94a3b8; font-size: 13px; margin: 0; font-weight: 500;">Authorized Clinical Access Only</p>

        <div class="tabs" id="tabGroup">
            <div class="selector"></div>
            <div class="tab-item active" id="clinicalTab" onclick="toggleRole('clinical')">CLINICAL</div>
            <div class="tab-item" id="adminTab" onclick="toggleRole('admin')">GOVERNANCE</div>
        </div>

        <form id="loginForm">
            <div class="form-group">
                <label>Institutional Email</label>
                <input type="email" id="loginEmail" placeholder="id@prognosxai.com" required>
            </div>
            <div class="form-group">
                <label>Security Credential</label>
                <input type="password" id="loginPassword" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn-login" id="loginBtn">Initialize Authentication</button>
        </form>

        <div id="loader" class="loading-overlay">Establishing Secure Uplink...</div>

        <div id="regFooter" style="margin-top: 30px; font-size: 12px; color: #94a3b8; font-weight: 600;">
            NODE REGISTRATION: 
            <a href="/register/doctor" style="color: var(--primary); text-decoration: none; margin-left: 5px;">DOCTOR</a> | 
            <a href="/register/lab" style="color: var(--lab-green); text-decoration: none; margin-left: 5px;">LABORATORY</a>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCDUQ49HV5bdYnPrfdIG_8sOnA0dbYj0YU",
            authDomain: "prognosxai.firebaseapp.com",
            projectId: "prognosxai",
            storageBucket: "prognosxai.firebasestorage.app",
            messagingSenderId: "930871131065",
            appId: "1:930871131065:web:30e7fde84190e71ea55468"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let selectedRole = 'clinical';

        function showNotify(msg, isError = false) {
            const n = document.getElementById('notification');
            n.innerText = msg;
            n.className = isError ? 'show error' : 'show';
            setTimeout(() => n.className = '', 3500);
        }

        window.toggleRole = (role) => {
            selectedRole = role;
            const card = document.getElementById('card');
            const clinicalTab = document.getElementById('clinicalTab');
            const adminTab = document.getElementById('adminTab');
            const title = document.getElementById('title');
            const subtitle = document.getElementById('subtitle');
            const regFooter = document.getElementById('regFooter');

            if (role === 'admin') {
                card.classList.add('admin-active');
                clinicalTab.classList.remove('active');
                adminTab.classList.add('active');
                title.innerText = "Admin Portal";
                subtitle.innerText = "System Infrastructure Oversight";
                regFooter.style.opacity = "0.2";
                regFooter.style.pointerEvents = "none";
            } else {
                card.classList.remove('admin-active');
                clinicalTab.classList.add('active');
                adminTab.classList.remove('active');
                title.innerText = "Secure Terminal";
                subtitle.innerText = "Authorized Clinical Access Only";
                regFooter.style.opacity = "1";
                regFooter.style.pointerEvents = "auto";
            }
        };

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            const loginBtn = document.getElementById('loginBtn');
            const loader = document.getElementById('loader');

            loginBtn.disabled = true;
            loader.style.display = "block";

            try {
                const userCredential = await signInWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;
                const docSnap = await getDoc(doc(db, "users", user.uid));

                if (docSnap.exists()) {
                    const userData = docSnap.data();
                    const userRole = userData.role;

                    if (selectedRole === 'admin') {
                        if (userRole === 'admin') {
                            showNotify("Governance Access Granted");
                            // REDIRECT TO ADMIN PANEL
                            setTimeout(() => window.location.href = "/admin/panel", 1000);
                        } else {
                            showNotify("Access Denied: Administrative Privileges Required", true);
                        }
                    } else {
                        // Clinical Login Path
                        if (userRole === "doctor") {
                            showNotify("Physician Terminal Uplink Success");
                            setTimeout(() => window.location.href = "/doctor/dashboard", 1000);
                        } else if (userRole === "lab") {
                            showNotify("Laboratory Node Uplink Success");
                            setTimeout(() => window.location.href = "/lab/dashboard", 1000);
                        } else if (userRole === "admin") {
                            showNotify("Role Mismatch: Switch to Governance tab", true);
                        } else {
                            showNotify("Unauthorized Node Classification", true);
                        }
                    }
                }
            } catch (error) {
                showNotify("Authentication Failed: Invalid Credentials", true);
            } finally {
                loginBtn.disabled = false;
                loader.style.display = "none";
            }
        });
    </script>
</body>
</html>
