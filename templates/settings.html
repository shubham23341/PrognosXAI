<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Settings | PrognosXAI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
    <style>
        :root { 
            --primary: #1a73e8; --primary-dark: #1557b0; --bg-light: #f8fafc;
            --sidebar-dark: #0f172a; --text-main: #1e293b; --card-bg: #ffffff;
            --border: #e2e8f0;
        }

        body.dark-theme {
            --bg-light: #0f172a; --text-main: #f1f5f9;
            --card-bg: #1e293b; --border: #334155;
        }

        body { 
            font-family: 'Inter', sans-serif; margin: 0; background: var(--bg-light); 
            display: flex; min-height: 100vh; color: var(--text-main); transition: background 0.3s, color 0.3s;
        }
        
        /* --- Professional Logo Sidebar --- */
        .logo-box { display: flex; align-items: center; gap: 10px; text-decoration: none; margin-bottom: 40px; }
        .logo-icon { width: 32px; height: 32px; background: var(--primary); border-radius: 8px; display: flex; align-items: center; justify-content: center; color: white; font-weight: 800; font-size: 18px; box-shadow: 0 4px 10px rgba(26, 115, 232, 0.3); }
        .logo-text { font-size: 1.4rem; font-weight: 800; color: #60a5fa; letter-spacing: -0.5px; }
        .logo-text span { color: white; }

        .sidebar { width: 280px; background: var(--sidebar-dark); color: white; padding: 30px 20px; position: fixed; height: 100vh; z-index: 100; box-shadow: 4px 0 20px rgba(0,0,0,0.1); }
        .nav-link { color: #94a3b8; text-decoration: none; padding: 14px 18px; border-radius: 12px; margin-bottom: 8px; display: flex; align-items: center; font-weight: 500; transition: 0.3s; }
        .nav-link:hover { background: rgba(255,255,255,0.1); color: white; }
        .nav-link.active { background: var(--primary); color: white; box-shadow: 0 4px 12px rgba(26, 115, 232, 0.2); }

        .main-content { margin-left: 280px; padding: 40px 60px; width: calc(100% - 280px); }
        .card { background: var(--card-bg); padding: 40px; border-radius: 24px; border: 1px solid var(--border); max-width: 850px; margin-top: 30px; box-shadow: 0 10px 25px rgba(0,0,0,0.02); }
        
        .settings-section { margin-bottom: 45px; }
        .settings-section h3 { font-size: 1.1rem; font-weight: 700; margin-bottom: 25px; padding-bottom: 12px; border-bottom: 1px solid var(--border); color: var(--primary); }

        .profile-header { display: flex; align-items: center; gap: 24px; margin-bottom: 30px; }
        .avatar-wrapper { position: relative; width: 90px; height: 90px; }
        .avatar { 
            width: 100%; height: 100%; background: linear-gradient(135deg, var(--primary), #60a5fa); 
            color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; 
            font-size: 32px; font-weight: 800; border: 3px solid var(--card-bg); overflow: hidden;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
        }
        #avatarImg { width: 100%; height: 100%; object-fit: cover; display: none; }

        .input-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
        .form-group { display: flex; flex-direction: column; gap: 8px; }
        label { font-size: 11px; font-weight: 700; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.5px; }
        
        input { padding: 14px; border: 1.5px solid var(--border); border-radius: 12px; background: rgba(0,0,0,0.02); color: var(--text-main); font-size: 14px; outline: none; transition: 0.2s; }
        input:focus { border-color: var(--primary); background: var(--card-bg); }

        .toggle-row { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; }
        .switch { position: relative; display: inline-block; width: 48px; height: 26px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #cbd5e1; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 4px; bottom: 4px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--primary); }
        input:checked + .slider:before { transform: translateX(22px); }

        .btn-save { background: var(--primary); color: white; border: none; padding: 16px 32px; border-radius: 14px; font-weight: 700; cursor: pointer; width: 100%; margin-top: 10px; transition: 0.3s; }
        .btn-save:disabled { background: #94a3b8; cursor: not-allowed; }
        .btn-save:hover:not(:disabled) { background: var(--primary-dark); transform: translateY(-2px); box-shadow: 0 8px 16px rgba(26, 115, 232, 0.3); }

        #toast-container { position: fixed; top: 20px; right: 20px; z-index: 9999; }
        .toast { background: white; padding: 16px 24px; border-radius: 12px; box-shadow: 0 10px 15px rgba(0,0,0,0.1); margin-bottom: 10px; display: flex; align-items: center; gap: 12px; font-weight: 600; min-width: 250px; border-left: 6px solid #22c55e; animation: slideIn 0.3s ease forwards; color: #1e293b; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    </style>
</head>
<body>

    <div id="toast-container"></div>

    <aside class="sidebar">
        <a href="/" class="logo-box">
            <div class="logo-icon">P</div>
            <div class="logo-text">Prognos<span>XAI</span></div>
        </a>
        <div class="nav-group">
            <a href="/doctor/dashboard" class="nav-link">Clinical Workspace</a>
            <a href="/patient/database" class="nav-link">Patient Database</a>
            <a href="#" class="nav-link active">System Settings</a>
            <a href="/" class="nav-link">Back to Home</a>
        </div>
    </aside>

    <main class="main-content">
        <header class="header-title">
            <h1>Account Configuration</h1>
            <p style="color: #64748b;">Manage clinical profile and workstation preferences.</p>
        </header>

        <div class="card">
            <div class="settings-section">
                <h3>👨‍⚕️ Clinical Identity</h3>
                <div class="profile-header">
                    <div class="avatar-wrapper">
                        <div class="avatar" id="avatarBox">
                            <span id="avatarInitials">..</span>
                            <img id="avatarImg" alt="Profile">
                        </div>
                    </div>
                    <div>
                        <input type="file" id="imageInput" accept="image/*" style="display: none;">
                        <button onclick="document.getElementById('imageInput').click()" style="background:none; border:1px solid var(--border); padding:8px 16px; border-radius:8px; cursor:pointer; font-size:12px; font-weight:600; color: var(--text-main);">Update Signature Image</button>
                    </div>
                </div>
                
                <div class="input-grid">
                    <div class="form-group">
                        <label>Practitioner Full Name</label>
                        <input type="text" id="docFullName" placeholder="Loading identity...">
                    </div>
                    <div class="form-group">
                        <label>Medical License / Registration</label>
                        <input type="text" value="REG-9920-XAI" readonly style="opacity: 0.7; cursor: not-allowed;">
                    </div>
                </div>
            </div>

            <div class="settings-section">
                <h3>🎨 Workstation Environment</h3>
                <div class="toggle-row">
                    <div><strong>Low-Light Mode (Dark)</strong></div>
                    <label class="switch">
                        <input type="checkbox" id="darkModeToggle">
                        <span class="slider"></span>
                    </label>
                </div>
            </div>

            <button class="btn-save" id="saveBtn">Apply Configuration</button>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";
        
        const firebaseConfig = {
            apiKey: "AIzaSyCDUQ49HV5bdYnPrfdIG_8sOnA0dbYj0YU",
            authDomain: "prognosxai.firebaseapp.com",
            projectId: "prognosxai",
            storageBucket: "prognosxai.firebasestorage.app",
            messagingSenderId: "930871131065",
            appId: "1:930871131065:web:30e7fde84190e71ea55468"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        function showToast(message) {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerHTML = `✅ ${message}`;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 4000);
        }

        // --- Fetch & Populate Data ---
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const userRef = doc(db, "users", user.uid);
                const userDoc = await getDoc(userRef);
                if (userDoc.exists()) {
                    const data = userDoc.data();
                    const name = data.fullName || "Practitioner";
                    document.getElementById('docFullName').value = name;
                    
                    const initials = name.split(' ').map(n => n[0]).join('').toUpperCase().substring(0, 2);
                    document.getElementById('avatarInitials').innerText = initials;

                    if (data.profileImage) {
                        const img = document.getElementById('avatarImg');
                        img.src = data.profileImage;
                        img.style.display = 'block';
                        document.getElementById('avatarInitials').style.display = 'none';
                    }
                }
            } else { 
                window.location.href = "/login"; 
            }
        });

        // --- Handle Image Preview ---
        document.getElementById('imageInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    const img = document.getElementById('avatarImg');
                    img.src = event.target.result;
                    img.style.display = 'block';
                    document.getElementById('avatarInitials').style.display = 'none';
                    // Temporary store for saving
                    window.pendingImageBase64 = event.target.result;
                };
                reader.readAsDataURL(file);
            }
        });

        // --- Dark Mode ---
        const darkModeToggle = document.getElementById('darkModeToggle');
        darkModeToggle.addEventListener('change', () => {
            document.body.classList.toggle('dark-theme');
            localStorage.setItem('clinical-theme', document.body.classList.contains('dark-theme') ? 'dark' : 'light');
        });

        if(localStorage.getItem('clinical-theme') === 'dark') {
            document.body.classList.add('dark-theme');
            darkModeToggle.checked = true;
        }

        // --- Core Save Function ---
        document.getElementById('saveBtn').addEventListener('click', async () => {
            const user = auth.currentUser;
            if (!user) return;

            const saveBtn = document.getElementById('saveBtn');
            saveBtn.innerText = "Synchronizing...";
            saveBtn.disabled = true;

            const newName = document.getElementById('docFullName').value;
            const updateData = { fullName: newName };

            // Check if image is within 1MB Firestore limit
            if (window.pendingImageBase64) {
                if (window.pendingImageBase64.length > 800000) { 
                    alert("Selected image is too large for the database. Please use a smaller profile photo.");
                    saveBtn.innerText = "Apply Configuration";
                    saveBtn.disabled = false;
                    return;
                }
                updateData.profileImage = window.pendingImageBase64;
            }

            try {
                const userRef = doc(db, "users", user.uid);
                await updateDoc(userRef, updateData);
                
                showToast("Profile updated.");
                window.pendingImageBase64 = null;
                
                // Update initials UI immediately
                const initials = newName.split(' ').map(n => n[0]).join('').toUpperCase().substring(0, 2);
                document.getElementById('avatarInitials').innerText = initials;

            } catch (err) {
                console.error("Firebase Error:", err);
                alert("Permission Denied: Ensure you have published your Firebase Security Rules.");
            } finally {
                saveBtn.innerText = "Apply Updates";
                saveBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
