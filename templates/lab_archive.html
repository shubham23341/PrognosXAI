<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab Archive | PrognosXAI System</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --terminal-bg: #0a0c10;
            --panel-bg: #161b22;
            --accent-cyan: #00d4ff;
            --border-dim: #30363d;
            --text-dim: #8b949e;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            margin: 0; 
            background: var(--terminal-bg); 
            color: #e6edf3; 
            display: flex;
            height: 100vh;
        }

        /* --- Sidebar Navigation --- */
        .sidebar { 
            width: 80px; 
            background: var(--panel-bg); 
            border-right: 1px solid var(--border-dim);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 0;
        }
        .side-icon { font-size: 24px; margin-bottom: 30px; opacity: 0.5; cursor: pointer; transition: 0.3s; }
        .side-icon:hover { opacity: 1; color: var(--accent-cyan); }
        .side-icon.active { opacity: 1; color: var(--accent-cyan); border-left: 3px solid var(--accent-cyan); width: 100%; text-align: center; }

        /* --- Main Content --- */
        .main-content { flex: 1; padding: 40px; overflow-y: auto; }

        header { 
            display: flex; 
            justify-content: space-between; 
            align-items: flex-end; 
            margin-bottom: 40px;
            border-bottom: 1px solid var(--border-dim);
            padding-bottom: 20px;
        }

        h1 { font-family: 'JetBrains Mono', monospace; font-size: 1.5rem; margin: 0; color: var(--accent-cyan); }

        /* --- Search Bar --- */
        .search-box {
            background: #0d1117;
            border: 1px solid var(--border-dim);
            padding: 10px 20px;
            border-radius: 8px;
            color: white;
            font-family: 'JetBrains Mono';
            width: 300px;
            outline: none;
        }

        /* --- Archive Table --- */
        .archive-card {
            background: var(--panel-bg);
            border: 1px solid var(--border-dim);
            border-radius: 12px;
            overflow: hidden;
        }

        table { width: 100%; border-collapse: collapse; font-family: 'JetBrains Mono', monospace; }
        th { background: #0d1117; padding: 18px; text-align: left; font-size: 11px; color: var(--text-dim); text-transform: uppercase; }
        td { padding: 18px; font-size: 13px; border-bottom: 1px solid var(--border-dim); }
        tr:hover { background: #1c2128; }

        .badge-id { background: #30363d; color: var(--accent-cyan); padding: 4px 8px; border-radius: 4px; font-size: 11px; }
        .status-verified { color: #3fb950; font-size: 11px; font-weight: 700; }
        
        .doc-tag { color: #8b949e; font-size: 11px; }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--terminal-bg); }
        ::-webkit-scrollbar-thumb { background: var(--border-dim); border-radius: 10px; }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div style="font-size: 28px; margin-bottom: 40px;">🧪</div>
        <div class="side-icon" onclick="window.location.href='/lab/dashboard'" title="Live Console">📡</div>
        <div class="side-icon active" title="System Archives">📂</div>
        <div class="side-icon" onclick="window.location.href='/settings'" title="Settings">⚙️</div>
    </aside>

    <main class="main-content">
        <header>
            <div>
                <h1>ARCHIVE_REGISTRY_v4.0</h1>
                <p style="color: var(--text-dim); font-size: 12px; margin-top: 5px;">Historical audit of all synchronized patient datasets.</p>
            </div>
            <input type="text" class="search-box" id="searchInput" placeholder="SEARCH_BY_PATIENT..." onkeyup="filterTable()">
        </header>

        <div class="archive-card">
            <table id="archiveTable">
                <thead>
                    <tr>
                        <th>Packet_ID</th>
                        <th>Patient_Identity</th>
                        <th>Age</th>
                        <th>Authorized_Doctor</th>
                        <th>Transmission_Time</th>
                        <th>Network_Status</th>
                    </tr>
                </thead>
                <tbody id="archiveBody">
                    </tbody>
            </table>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";
        import { getFirestore, collection, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCDUQ49HV5bdYnPrfdIG_8sOnA0dbYj0YU",
            authDomain: "prognosxai.firebaseapp.com",
            projectId: "prognosxai",
            storageBucket: "prognosxai.firebasestorage.app",
            messagingSenderId: "930871131065",
            appId: "1:930871131065:web:30e7fde84190e71ea55468"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        onAuthStateChanged(auth, (user) => {
            if (user) {
                syncArchive();
            } else {
                window.location.href = "/login";
            }
        });

        function syncArchive() {
            const q = query(collection(db, "diagnostic_history"), orderBy("timestamp", "desc"));
            onSnapshot(q, (snap) => {
                const tbody = document.getElementById('archiveBody');
                tbody.innerHTML = "";
                snap.forEach(doc => {
                    const d = doc.data();
                    tbody.innerHTML += `
                        <tr>
                            <td><span class="badge-id">${doc.id.substring(0,8).toUpperCase()}</span></td>
                            <td style="font-weight:700; color:#fff;">${d.patientName.toUpperCase()}</td>
                            <td>${d.age}</td>
                            <td class="doc-tag">MD_ID: ${d.doctorId || 'UNASSIGNED'}</td>
                            <td style="color: #8b949e;">${new Date(d.timestamp).toLocaleString()}</td>
                            <td><span class="status-verified">● CLOUD_SYNCED</span></td>
                        </tr>`;
                });
            });
        }

        // Simple Search Logic
        window.filterTable = () => {
            const input = document.getElementById("searchInput");
            const filter = input.value.toUpperCase();
            const tr = document.getElementById("archiveTable").getElementsByTagName("tr");

            for (let i = 1; i < tr.length; i++) {
                let td = tr[i].getElementsByTagName("td")[1];
                if (td) {
                    let txtValue = td.textContent || td.innerText;
                    tr[i].style.display = txtValue.toUpperCase().indexOf(filter) > -1 ? "" : "none";
                }
            }
        };
    </script>
</body>
</html>
