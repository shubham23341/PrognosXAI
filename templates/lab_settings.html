<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab Settings | PrognosXAI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <script>
        // Apply theme immediately to prevent white flash
        if (localStorage.getItem('theme') === 'dark') {
            document.documentElement.classList.add('dark-mode');
        }
    </script>

    <style>
        :root { 
            --primary: #1a73e8; 
            --bg-light: #f8fafc;
            --sidebar-dark: #0f172a;
            --text-main: #1e293b;
            --border: #e2e8f0;
            --card-bg: #ffffff;
        }

        .dark-mode {
            --bg-light: #0f172a;
            --text-main: #f1f5f9;
            --border: #334155;
            --card-bg: #1e293b;
        }

        body { font-family: 'Inter', sans-serif; margin: 0; background: var(--bg-light); display: flex; min-height: 100vh; color: var(--text-main); transition: 0.3s; }
        
        /* --- Updated Professional Logo Sidebar --- */
        .logo-box { display: flex; align-items: center; gap: 10px; text-decoration: none; margin-bottom: 40px; }
        .logo-icon { width: 32px; height: 32px; background: var(--primary); border-radius: 8px; display: flex; align-items: center; justify-content: center; color: white; font-weight: 800; font-size: 18px; box-shadow: 0 4px 10px rgba(26, 115, 232, 0.3); }
        .logo-text { font-size: 1.4rem; font-weight: 800; color: #60a5fa; letter-spacing: -0.5px; }
        .logo-text span { color: white; }

        .sidebar { width: 280px; background: var(--sidebar-dark); color: white; padding: 30px 20px; position: fixed; height: 100vh; z-index: 100; box-shadow: 4px 0 20px rgba(0,0,0,0.1); }
        
        .nav-group { flex-grow: 1; }
        .nav-link { color: #94a3b8; text-decoration: none; padding: 14px 18px; border-radius: 12px; margin-bottom: 8px; display: block; font-weight: 500; cursor: pointer; transition: 0.2s; font-size: 0.95rem; }
        .nav-link:hover { background: rgba(255,255,255,0.1); color: white; }
        .nav-link.active { background: var(--primary); color: white; box-shadow: 0 4px 12px rgba(26, 115, 232, 0.2); }

        /* --- Layout --- */
        .main-content { margin-left: 280px; padding: 40px 60px; width: calc(100% - 280px); }
        .header-flex { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
        .btn-logout { background: #fee2e2; color: #ef4444; border: 1px solid #fecaca; padding: 10px 20px; border-radius: 10px; font-weight: 700; cursor: pointer; text-decoration: none; font-size: 11px; text-transform: uppercase; transition: 0.2s; }
        .btn-logout:hover { background: #ef4444; color: white; }

        .card { background: var(--card-bg); padding: 35px; border-radius: 24px; border: 1px solid var(--border); box-shadow: 0 10px 25px rgba(0,0,0,0.02); }
        .card h3 { margin-top: 0; font-weight: 700; color: var(--primary); font-size: 1.1rem; margin-bottom: 25px; padding-bottom: 12px; border-bottom: 1px solid var(--border); }
        
        /* --- Tab Logic --- */
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.4s ease; }

        /* --- Components --- */
        .form-group { margin-bottom: 20px; display: flex; flex-direction: column; gap: 8px; }
        label { font-size: 11px; font-weight: 700; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.5px; }
        input { padding: 14px; border: 1.5px solid var(--border); border-radius: 12px; outline: none; background: var(--bg-light); color: var(--text-main); font-size: 14px; transition: 0.2s; }
        input:focus { border-color: var(--primary); }

        .btn-save { background: var(--primary); color: white; border: none; padding: 16px; border-radius: 14px; font-weight: 700; cursor: pointer; width: 100%; margin-top: 10px; transition: 0.3s; }
        .btn-save:hover { background: #1557b0; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(26, 115, 232, 0.3); }
        
        .toggle-row { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; border-bottom: 1px solid var(--border); }
        .switch { position: relative; display: inline-block; width: 50px; height: 24px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; inset: 0; background-color: #ccc; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 4px; bottom: 4px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--primary); }
        input:checked + .slider:before { transform: translateX(26px); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <aside class="sidebar">
        <a href="/" class="logo-box">
            <div class="logo-icon">P</div>
            <div class="logo-text">Prognos<span>XAI</span></div>
        </a>

        <div class="nav-group">
            <div class="nav-link active" id="tabProfileLink" onclick="switchTab('profile')">🏢 Lab Profile</div>
            <div class="nav-link" id="tabInterfaceLink" onclick="switchTab('interface')">🎨 Interface Settings</div>
            <hr style="border: 0; border-top: 1px solid rgba(255,255,255,0.1); margin: 20px 0;">
            <a href="/lab/dashboard" class="nav-link">🏠 Back to Dashboard</a>
        </div>
    </aside>

    <main class="main-content">
        <header class="header-flex">
            <div>
                <h1 style="margin:0; font-weight:800; font-size:2.2rem; letter-spacing: -1px;">Node Configuration</h1>
                <p style="margin-top:5px; color: #64748b;">Node ID: <span id="nodeId" style="color: var(--primary); font-weight: 700; font-family: 'JetBrains Mono';">--</span></p>
            </div>
            <a href="/logout" class="btn-logout">LOGOUT TERMINAL</a>
        </header>

        <section id="viewProfile" class="tab-content active">
            <div class="card">
                <h3>Laboratory Information</h3>
                <form id="profileForm">
                    <div class="form-group">
                        <label>Registered Lab Name</label>
                        <input type="text" id="labName" placeholder="Enter Full Lab Name">
                    </div>
                    <div class="form-group">
                        <label>License Number</label>
                        <input type="text" id="labLicense" placeholder="L-XXXX-XXXX">
                    </div>
                    <div class="form-group">
                        <label>Contact Email</label>
                        <input type="email" id="labEmail" placeholder="admin@lab.com">
                    </div>
                    <button type="submit" class="btn-save">Update Lab Profile</button>
                </form>
            </div>
        </section>

        <section id="viewInterface" class="tab-content">
            <div class="card">
                <h3>UI & Preferences</h3>
                <div class="toggle-row">
                    <div>
                        <div style="font-weight: 600;">Dark Mode</div>
                        <div style="font-size: 12px; color: #94a3b8;">Switch to a low-light visual theme</div>
                    </div>
                    <label class="switch">
                        <input type="checkbox" id="darkModeToggle">
                        <span class="slider"></span>
                    </label>
                </div>
                <div class="toggle-row">
                    <div>
                        <div style="font-weight: 600;">Compact Table View</div>
                        <div style="font-size: 12px; color: #94a3b8;">Show more records on screen</div>
                    </div>
                    <label class="switch">
                        <input type="checkbox">
                        <span class="slider"></span>
                    </label>
                </div>
            </div>
        </section>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyCDUQ49HV5bdYnPrfdIG_8sOnA0dbYj0YU",
            authDomain: "prognosxai.firebaseapp.com",
            projectId: "prognosxai",
            storageBucket: "prognosxai.firebasestorage.app",
            messagingSenderId: "930871131065",
            appId: "1:930871131065:web:30e7fde84190e71ea55468"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Tab Management
        window.switchTab = (tab) => {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            
            if(tab === 'profile') {
                document.getElementById('viewProfile').classList.add('active');
                document.getElementById('tabProfileLink').classList.add('active');
            } else {
                document.getElementById('viewInterface').classList.add('active');
                document.getElementById('tabInterfaceLink').classList.add('active');
            }
        };

        // Dark Mode Logic
        const darkModeToggle = document.getElementById('darkModeToggle');
        if (localStorage.getItem('theme') === 'dark') darkModeToggle.checked = true;

        darkModeToggle.addEventListener('change', () => {
            if (darkModeToggle.checked) {
                document.documentElement.classList.add('dark-mode');
                localStorage.setItem('theme', 'dark');
            } else {
                document.documentElement.classList.remove('dark-mode');
                localStorage.setItem('theme', 'light');
            }
        });

        // Load Firebase Data
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                document.getElementById('nodeId').innerText = user.uid.substring(0,8).toUpperCase();
                const userRef = doc(db, "users", user.uid);
                const snap = await getDoc(userRef);
                
                if (snap.exists()) {
                    const data = snap.data();
                    document.getElementById('labName').value = data.labName || "";
                    document.getElementById('labLicense').value = data.license || "";
                    document.getElementById('labEmail').value = data.email || user.email;
                }

                document.getElementById('profileForm').addEventListener('submit', async (e) => {
                    e.preventDefault();
                    await updateDoc(userRef, {
                        labName: document.getElementById('labName').value,
                        license: document.getElementById('labLicense').value
                    });
                    alert("Lab profile updated successfully.");
                });
            } else { window.location.href = "/login"; }
        });
    </script>
</body>
</html>
