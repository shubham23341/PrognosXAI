<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Logout | PrognosXAI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1a73e8;
            --navy: #0f172a;
            --slate: #64748b;
            --bg: #f8fafc;
        }

        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            background-color: var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            color: var(--navy);
        }

        .logout-card {
            background: white;
            padding: 50px;
            border-radius: 32px;
            box-shadow: 0 20px 50px rgba(15, 23, 42, 0.08);
            text-align: center;
            max-width: 450px;
            width: 90%;
            border: 1px solid #e2e8f0;
        }

        .icon-circle {
            width: 80px;
            height: 80px;
            background: #f0f7ff;
            color: var(--primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 30px;
            font-size: 32px;
        }

        h1 {
            font-size: 24px;
            font-weight: 800;
            margin-bottom: 15px;
            letter-spacing: -0.5px;
        }

        p {
            color: var(--slate);
            line-height: 1.6;
            margin-bottom: 35px;
            font-size: 15px;
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn {
            padding: 14px 25px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 700;
            font-size: 14px;
            transition: 0.3s;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
            box-shadow: 0 4px 12px rgba(26, 115, 232, 0.2);
        }

        .btn-primary:hover {
            background: #1557b0;
            transform: translateY(-2px);
        }

        .btn-outline {
            background: transparent;
            color: var(--slate);
            border: 1.5px solid #e2e8f0;
        }

        .btn-outline:hover {
            background: #f8fafc;
            color: var(--navy);
            border-color: #cbd5e1;
        }

        .security-badge {
            margin-top: 40px;
            font-size: 11px;
            color: #94a3b8;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .dot { width: 6px; height: 6px; background: #10b981; border-radius: 50%; }
    </style>
</head>
<body>

    <div class="logout-card">
        <div class="icon-circle">🛡️</div>
        <h1>Securely Signed Out</h1>
        <p>Your clinical session has been ended and all local cache has been cleared. Thank you for using PrognosXAI.</p>
        
        <div class="btn-group">
            <a href="/login" class="btn btn-primary">Sign In Again</a>
            <a href="/" class="btn btn-outline">Return to Home</a>
        </div>

        <div class="security-badge">
            <span class="dot"></span> Session Encrypted & Terminated
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getAuth, signOut } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";

        // Your Config
        const firebaseConfig = {
            apiKey: "AIzaSyCDUQ49HV5bdYnPrfdIG_8sOnA0dbYj0YU",
            authDomain: "prognosxai.firebaseapp.com",
            projectId: "prognosxai",
            storageBucket: "prognosxai.firebasestorage.app",
            messagingSenderId: "930871131065",
            appId: "1:930871131065:web:30e7fde84190e71ea55468"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // Optional: Force a Firebase SignOut if they hit this page via URL
        signOut(auth).catch((error) => console.error("Sign out error", error));
    </script>
</body>
</html>
